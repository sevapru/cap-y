# cap-x / cap-y runtime stacks — start exactly ONE of cap-y-base | cap-y-default |
# cap-y-open | cap-y-nvidia at a time (they reuse overlapping host ports).
#
# ─── Architecture selection ──────────────────────────────────────────────────
# Unified Dockerfiles live under docker/ and use Docker's built-in TARGETARCH
# (set automatically to "amd64" or "arm64" based on the build host).
# No PLATFORM_ARCH variable needed — just run docker compose build directly:
#
#   docker compose -f docker/docker-compose.capx.yml build cap-y-base
#
# To cross-build for a different arch:
#   docker compose -f docker/docker-compose.capx.yml build --platform linux/arm64 cap-y-base
#
# The per-arch subdirectories (docker/aarch64/, docker/x86_64/) are kept as
# reference but are no longer used by compose.
#
# ─── Compose profiles ────────────────────────────────────────────────────────
#   base     → cap-y-base (foundation image; stdin/tty for interactive bash, no servers)
#   default  → cap-y-default
#   open     → cap-y-open
#   nvidia   → cap-y-nvidia
#   dev      → cap-y-dev
#   test*    → one-shot verification containers
#
services:

  # ---------------------------------------------------------------------------
  # cap-y:base — MIT/Apache/BSD clean foundation
  # License ceiling: Meta SAM License (SAM3). Commercially deployable.
  # ---------------------------------------------------------------------------
  cap-y-base:
    build:
      context: ..
      dockerfile: docker/Dockerfile.base
      args:
        CUDA_ARCH_BIN: "${CUDA_ARCH_BIN:-11.0}"
        WITH_DEMOGRASP: "${WITH_DEMOGRASP:-1}"
    image: cap-y:base
    runtime: nvidia
    profiles: ["base"]
    shm_size: "8g"
    init: true
    stdin_open: true
    tty: true
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/data/huggingface
      - CUDA_HOME=/usr/local/cuda
      - MUJOCO_GL=egl
    volumes:
      - ..:/workspace
      - ${HOME}/.cache/huggingface:/data/huggingface
      - capx-uv-cache:/root/.cache/uv
      - capx-ccache:/root/.ccache

  # ---------------------------------------------------------------------------
  # cap-y:default — + cuRobo + ContactGraspNet (NVIDIA NC license)
  # Commercial use: NOT permitted without separate NVIDIA licensing.
  # ---------------------------------------------------------------------------
  cap-y-default:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        BASE_IMAGE: cap-y:base
        CUDA_ARCH_BIN: "${CUDA_ARCH_BIN:-11.0}"
    image: cap-y:default
    runtime: nvidia
    profiles: ["default"]
    shm_size: "8g"
    init: true
    ports:
      - "8100:8100"    # Serving gateway
      - "8110:8110"    # OpenRouter LLM proxy
      - "8113:8113"    # SAM2 (full profile)
      - "8114:8114"    # SAM3
      - "8115:8115"    # ContactGraspNet
      - "8116:8116"    # PyRoKi IK
      - "8117:8117"    # CuRobo (NVIDIA NC)
      - "8118:8118"    # OWL-ViT (full profile)
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/data/huggingface
      - CUDA_HOME=/usr/local/cuda
      - CAPX_PROFILE=${CAPX_PROFILE:-default}
      - CAPX_HOST=0.0.0.0
      - MUJOCO_GL=egl
    volumes:
      - ..:/workspace
      - ${HOME}/.cache/huggingface:/data/huggingface
      - capx-uv-cache:/root/.cache/uv
      - capx-ccache:/root/.ccache
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/.capx-ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # cap-y:open — + ROS2 full stack + nvblox + Drake + dfx_inspire_service
  # License ceiling: Meta SAM License. Commercially deployable.
  # ---------------------------------------------------------------------------
  cap-y-open:
    build:
      context: ..
      dockerfile: docker/Dockerfile.open
      args:
        BASE_IMAGE: cap-y:base
        CUDA_ARCH_BIN: "${CUDA_ARCH_BIN:-11.0}"
    image: cap-y:open
    runtime: nvidia
    shm_size: "8g"
    init: true
    profiles: ["open", "all"]
    ports:
      - "8100:8100"    # Serving gateway
      - "8200:8200"    # Web UI
      - "8110:8110"
      - "8114:8114"    # SAM3
      - "8116:8116"    # PyRoKi IK
      - "8119:8119"    # DemoGrasp (MIT)
      - "8120:8120"    # GraspAnalytic / rh56_controller (MIT)
      - "8124:8124"    # Newton
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/data/huggingface
      - CUDA_HOME=/usr/local/cuda
      - CAPX_PROFILE=${CAPX_PROFILE:-open}
      - CAPX_HOST=0.0.0.0
      - MUJOCO_GL=egl
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - DEMOGRASP_CHECKPOINT=${DEMOGRASP_CHECKPOINT:-}
    volumes:
      - ..:/workspace
      - ${HOME}/.cache/huggingface:/data/huggingface
      - capx-uv-cache:/root/.cache/uv
      - capx-ccache:/root/.ccache
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/.capx-ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # cap-y:nvidia — + Isaac ROS cuMotion + cuVSLAM + ScheduleStream
  # Requires NVIDIA Source Code License Agreement.
  # ---------------------------------------------------------------------------
  cap-y-nvidia:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nvidia
      args:
        BASE_IMAGE: cap-y:open
    image: cap-y:nvidia
    runtime: nvidia
    shm_size: "8g"
    init: true
    profiles: ["nvidia", "all"]
    ports:
      - "8100:8100"    # Serving gateway
      - "8110:8110"
      - "8114:8114"
      - "8116:8116"
      - "8119:8119"
      - "8120:8120"
      - "8124:8124"    # Newton
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/data/huggingface
      - CUDA_HOME=/usr/local/cuda
      - CAPX_PROFILE=${CAPX_PROFILE:-nvidia}
      - CAPX_HOST=0.0.0.0
      - MUJOCO_GL=egl
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - DEMOGRASP_CHECKPOINT=${DEMOGRASP_CHECKPOINT:-}
    volumes:
      - ..:/workspace
      - ${HOME}/.cache/huggingface:/data/huggingface
      - capx-uv-cache:/root/.cache/uv
      - capx-ccache:/root/.ccache
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/.capx-ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # cap-y:dev — all extras, both sim venvs, no cache cleaned (development only)
  # ---------------------------------------------------------------------------
  cap-y-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      args:
        BASE_IMAGE: cap-y:base
    image: cap-y:dev
    runtime: nvidia
    profiles: ["dev"]
    shm_size: "16g"
    init: true
    stdin_open: true
    tty: true
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/data/huggingface
      - CUDA_HOME=/usr/local/cuda
      - MUJOCO_GL=egl
    volumes:
      - ..:/workspace
      - ${HOME}/.cache/huggingface:/data/huggingface
      - capx-uv-cache:/root/.cache/uv
      - capx-ccache:/root/.ccache

  # ---------------------------------------------------------------------------
  # Test services
  # ---------------------------------------------------------------------------
  capx-test:
    image: cap-y:base
    runtime: nvidia
    entrypoint: python
    profiles: ["test"]
    volumes:
      - ..:/workspace
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - MUJOCO_GL=egl
    command: ["/workspace/scripts/test_container_base.py"]

  capx-test-open:
    image: cap-y:open
    runtime: nvidia
    entrypoint: python
    profiles: ["test-open"]
    volumes:
      - ..:/workspace
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - MUJOCO_GL=egl
      - ROS_DISTRO=jazzy
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    command: ["/workspace/scripts/test_container_open.py"]

  capx-test-nvidia:
    image: cap-y:nvidia
    runtime: nvidia
    entrypoint: python
    profiles: ["test-nvidia"]
    volumes:
      - ..:/workspace
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - MUJOCO_GL=egl
      - ROS_DISTRO=jazzy
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    command: ["/workspace/scripts/test_container_nvidia.py"]

  capx-test-default:
    image: cap-y:default
    runtime: nvidia
    entrypoint: python
    profiles: ["test-default"]
    volumes:
      - ..:/workspace
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - MUJOCO_GL=egl
      - CAPY_REQUIRE_LICENSED_STACK=1
    command: ["/workspace/scripts/test_container_base.py"]

  capx-test-dev:
    image: cap-y:dev
    runtime: nvidia
    entrypoint: python
    profiles: ["test-dev"]
    volumes:
      - ..:/workspace
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - MUJOCO_GL=egl
    command: ["-m", "pytest", "tests/test_capx.py", "-v", "--tb=short"]

volumes:
  capx-uv-cache:
  capx-ccache:
