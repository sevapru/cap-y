services:
  capx-serving:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        CUDA_ARCH_BIN: "${CUDA_ARCH_BIN:-11.0}"
        OPENCV_VERSION: "${OPENCV_VERSION:-4.13.0}"
    image: cap-y:latest

    runtime: nvidia
    shm_size: "8g"
    init: true
    ports:
      - "8110:8110"    # OpenRouter LLM proxy
      - "8113:8113"    # SAM2 (full profile)
      - "8114:8114"    # SAM3
      - "8115:8115"    # ContactGraspNet
      - "8116:8116"    # PyRoKi
      - "8117:8117"    # OWL-ViT (full profile)
      - "8118:8118"    # CuRobo (custom profile)
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/data/huggingface
      - CUDA_HOME=/usr/local/cuda
      - CAPX_PROFILE=${CAPX_PROFILE:-default}
      - CAPX_HOST=0.0.0.0
      - MUJOCO_GL=egl
    volumes:
      - ..:/workspace
      - ${HOME}/.cache/huggingface:/data/huggingface
      - capx-uv-cache:/root/.cache/uv
      - capx-ccache:/root/.ccache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8114/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  capx-open:
    build:
      context: ..
      dockerfile: docker/Dockerfile.open
      args:
        BASE_IMAGE: cap-y:latest
        CUDA_ARCH_BIN: "${CUDA_ARCH_BIN:-11.0}"
    image: cap-y-open:latest

    runtime: nvidia
    shm_size: "8g"
    init: true
    profiles: ["open", "all"]
    ports:
      - "8100:8100"    # Serving gateway
      - "8200:8200"    # Web UI
      - "8110:8110"
      - "8113:8113"
      - "8114:8114"
      - "8115:8115"
      - "8116:8116"
      - "8117:8117"
      - "8118:8118"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/data/huggingface
      - CUDA_HOME=/usr/local/cuda
      - CAPX_PROFILE=${CAPX_PROFILE:-default}
      - CAPX_HOST=0.0.0.0
      - MUJOCO_GL=egl
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    volumes:
      - ..:/workspace
      - ${HOME}/.cache/huggingface:/data/huggingface
      - capx-uv-cache:/root/.cache/uv
      - capx-ccache:/root/.ccache
    restart: unless-stopped

  capx-nvidia:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nvidia
      args:
        BASE_IMAGE: cap-y-open:latest
    image: cap-y-nvidia:latest

    runtime: nvidia
    shm_size: "8g"
    init: true
    profiles: ["nvidia", "all"]
    ports:
      - "8110:8110"
      - "8113:8113"
      - "8114:8114"
      - "8115:8115"
      - "8116:8116"
      - "8117:8117"
      - "8118:8118"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/data/huggingface
      - CUDA_HOME=/usr/local/cuda
      - CAPX_PROFILE=${CAPX_PROFILE:-default}
      - CAPX_HOST=0.0.0.0
      - MUJOCO_GL=egl
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    volumes:
      - ..:/workspace
      - ${HOME}/.cache/huggingface:/data/huggingface
      - capx-uv-cache:/root/.cache/uv
      - capx-ccache:/root/.ccache
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # cap-y:dev — all extras, both sim venvs, no cache cleaned (development only)
  # ---------------------------------------------------------------------------
  cap-y-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      args:
        BASE_IMAGE: cap-y:base
    image: cap-y:dev
    runtime: nvidia
    shm_size: "16g"
    init: true
    stdin_open: true
    tty: true
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/data/huggingface
      - CUDA_HOME=/usr/local/cuda
      - MUJOCO_GL=egl
      - CAPX_PROFILE=${CAPX_PROFILE:-open}
    volumes:
      - ..:/workspace
      - ${HOME}/.cache/huggingface:/data/huggingface
      - capx-uv-cache:/root/.cache/uv
      - capx-ccache:/root/.ccache

  capx-base:
    image: cap-y:latest
    runtime: nvidia
    shm_size: "8g"
    init: true
    stdin_open: true
    tty: true
    entrypoint: /bin/bash
    ports:
      - "8100:8100"    # Serving gateway (all backends aggregated)
      - "8200:8200"    # Web UI (FastAPI + React)
      - "8110:8110"    # OpenRouter LLM proxy
      - "8114:8114"    # SAM3
      - "8116:8116"    # PyRoKi
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HOME=/data/huggingface
      - CUDA_HOME=/usr/local/cuda
      - MUJOCO_GL=egl
    volumes:
      - ..:/workspace
      - ${HOME}/.cache/huggingface:/data/huggingface
      - capx-uv-cache:/root/.cache/uv
      - capx-ccache:/root/.ccache

  capx-test:
    image: cap-y:latest
    container_name: cap-y-test
    runtime: nvidia
    entrypoint: python
    profiles: ["test"]
    volumes:
      - ..:/workspace
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - MUJOCO_GL=egl
    command: ["/workspace/scripts/test_container_base.py"]

  capx-test-open:
    image: cap-y-open:latest
    container_name: cap-y-test-open
    runtime: nvidia
    entrypoint: python
    profiles: ["test-open"]
    volumes:
      - ..:/workspace
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - MUJOCO_GL=egl
      - ROS_DISTRO=jazzy
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    command: ["/workspace/scripts/test_container_open.py"]

  capx-test-nvidia:
    image: cap-y-nvidia:latest
    container_name: cap-y-test-nvidia
    runtime: nvidia
    entrypoint: python
    profiles: ["test-nvidia"]
    volumes:
      - ..:/workspace
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - MUJOCO_GL=egl
      - ROS_DISTRO=jazzy
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    command: ["/workspace/scripts/test_container_nvidia.py"]

  capx-test-dev:
    image: cap-y:dev
    runtime: nvidia
    entrypoint: python
    profiles: ["test-dev"]
    volumes:
      - ..:/workspace
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - MUJOCO_GL=egl
    command: ["-m", "pytest", "tests/test_capx.py", "-v", "--tb=short"]

volumes:
  capx-uv-cache:
  capx-ccache:
